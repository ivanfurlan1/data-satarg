name: Fetch Space-Track Data

on:
  schedule:
    - cron: '17 * * * *'   # cada hora (minuto 17)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Space-Track
        run: |
          curl -c cookies.txt -d "identity=${{ secrets.SPACETRACK_USER }}&password=${{ secrets.SPACETRACK_PASS }}" \
          https://www.space-track.org/ajaxauth/login

      - name: Fetch ALL objects (GP JSON)
        run: |
          curl -b cookies.txt \
          "https://www.space-track.org/basicspacedata/query/class/gp/format/json" \
          -o all_objects.json

      - name: Transform to ultra-compact JSON
        run: |
          jq '[.[] | [
            .NORAD_CAT_ID,
            .OBJECT_NAME,
            .OBJECT_TYPE,
            .TLE_LINE1,
            .TLE_LINE2
          ]]' all_objects.json > satellites.json

      - name: Generate TLE file (compatible with your web)
        run: |
          mkdir -p tle
          jq -r '.[] | "\(.OBJECT_NAME)\n\(.TLE_LINE1)\n\(.TLE_LINE2)"' all_objects.json > tle/all.txt

      - name: Commit and push files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add satellites.json tle/all.txt
          git commit -m "Update satellite data" || echo "No changes"
          git push
