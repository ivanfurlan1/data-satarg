name: Update Starlink TLE

on:
schedule:
- cron: "*/15 * * * *"   # cada 15 minutos
workflow_dispatch:

permissions:
contents: write

jobs:
update:
runs-on: ubuntu-latest

steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Descargar Starlink desde CelesTrak
    run: |
      curl -L "https://celestrak.org/NORAD/elements/gp.php?GROUP=starlink&FORMAT=tle" -o tle/starlink.txt

  - name: Commit cambios
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "github-actions@github.com"
      git add tle/starlink.txt
      git commit -m "update starlink tle" || echo "sin cambios"
      git push
